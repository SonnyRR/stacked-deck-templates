name: Build, Test & Publish
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}

      - name: NUKE
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true
          NUKE_TELEMETRY_OPTOUT: true
          # You'll need to introduce these values as secrets/variables
          # on a repository level. The dependabot placeholder values are
          # needed because for security reasons it cannot access secrets
          # or variables defined on a GitHub repository. If this repo is
          # hosted on another provider != GitHub, then feel free to remove
          # them, alongside with the 'Dependabot' yaml configuration.
          ContainerRegistryPAT: ${{ secrets.PAT || 'placeholder' }}
          ContainerRegistryUsername: ${{ vars.USERNAME || 'placeholder' }}
          ContainerRegistryUrl: ${{ vars.CR_URL || 'placeholder' }}
          # Below you should change the 'git' author info, so that the
          # semantic version tags are pushed with the correct author.
          GitAuthorUsername: 'github-actions[bot]'
          GitAuthorEmail: '41898282+github-actions[bot]@users.noreply.github.com'
        shell: bash
        run: ./build.sh PublishImage
